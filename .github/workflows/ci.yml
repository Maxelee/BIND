name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:

jobs:
  lint-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install package (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e .[dev]

      - name: Ruff lint
        run: ruff check src

      - name: Import smoke test
        run: |
          python -c "
          import bind
          from bind import data, model, train, metrics, paint
          from bind.inference import runner, pipeline, config, schemas, artifacts, io_gadget
          from bind.inference.paint import PaintConfig, PaintResult
          from bind.tools import slim_checkpoint, download_weights
          print('bind', bind.__version__, 'imports OK')
          "
