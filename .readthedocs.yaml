# Read the Docs configuration for BIND
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf

python:
  install:
    - requirements: docs/requirements.txt
    # Install the package itself so autodoc can import bind.* — but skip the
    # heavy ML dependencies (torch, lightning, pylians) on RTD; use the
    # autodoc_mock_imports list in conf.py instead.
    - method: pip
      path: .
      extra_requirements: []
